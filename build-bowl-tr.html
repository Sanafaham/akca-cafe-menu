<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#11100f">
  <title>AKÇA — Kendi Kaseni Oluştur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--amber:#d96724;--cream:#f7efe7;--muted:#aaa;--line:rgba(255,255,255,.14);--pill:rgba(255,255,255,.08)}*{box-sizing:border-box;margin:0;padding:0}html{background:#0d0d0c}body{min-height:100svh;color:#f8f1ea;font-family:"DM Sans",sans-serif;background:radial-gradient(circle at 30% 15%,rgba(217,103,36,.13),transparent 22rem),linear-gradient(135deg,#0b0c0b,#191715 52%,#0b0b0a);animation:fade .35s ease-out both}.page{width:min(100%,760px);margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 16px max(112px,calc(env(safe-area-inset-bottom) + 96px))}.panel{border:1px solid rgba(217,103,36,.65);border-radius:22px;padding:24px 20px;background:rgba(255,255,255,.025);box-shadow:0 22px 60px rgba(0,0,0,.24)}.back{display:inline-block;color:#f2b174;font-weight:600;letter-spacing:.08em;text-decoration:none;text-transform:uppercase;margin-bottom:22px}h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(2.45rem,11vw,4rem);line-height:1;color:var(--cream);font-weight:700}.note{margin:16px 0 28px;color:var(--muted);font-size:clamp(1.05rem,4vw,1.5rem);line-height:1.35}.section{padding:22px 0;border-top:1px solid var(--line)}.section:first-of-type{border-top:0}.section h2{color:#e78351;font-size:1rem;letter-spacing:.36em;text-transform:uppercase;margin-bottom:14px}.choices{display:flex;flex-wrap:wrap;gap:10px}.choice{position:relative;display:inline-grid;place-items:center;min-height:48px;padding:11px 22px;color:#f2eee9;background:var(--pill);border:1px solid rgba(255,255,255,.18);border-radius:999px;font-size:1.08rem;cursor:pointer;transition:.15s ease}.choice input{position:absolute;opacity:0}.choice:has(input:checked){border-color:var(--amber);background:rgba(217,103,36,.2);box-shadow:0 0 0 1px rgba(217,103,36,.55),0 0 22px rgba(217,103,36,.18)}.price{padding:20px 0 14px;text-align:center;color:#ddd;font-size:1.16rem;line-height:1.35;border-top:1px solid var(--line)}.add,.summary-actions a,.summary-actions button{width:100%;min-height:64px;border:0;border-radius:10px;background:linear-gradient(180deg,#e36f2d,#c94f10);color:#fff;font:600 1.25rem "DM Sans",sans-serif;cursor:pointer}.summary{position:fixed;inset:0;z-index:20;display:grid;align-items:end;padding:max(18px,env(safe-area-inset-top)) 14px max(22px,calc(env(safe-area-inset-bottom) + 22px));background:rgba(5,5,5,.74);backdrop-filter:blur(10px)}.summary[hidden]{display:none}.summary-card{width:min(100%,520px);max-height:calc(100svh - max(36px,env(safe-area-inset-top)) - max(44px,calc(env(safe-area-inset-bottom) + 44px)));overflow:auto;margin:0 auto;padding:22px;background:linear-gradient(145deg,#151310,#25201b);border:1px solid rgba(217,103,36,.55);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.45)}.summary h2{font-family:"Cormorant Garamond",Georgia,serif;font-size:2rem}.summary p{margin-top:8px;color:#ddd;line-height:1.45}.summary-actions{display:grid;gap:10px;margin-top:16px}.summary-actions button,.summary-actions a{display:grid;place-items:center;min-height:52px;font-size:1rem;text-decoration:none;border-radius:10px}.summary-actions button:nth-child(1){background:#2b2926}.summary-actions button:nth-child(2){background:#3a2620}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@media(max-width:390px){.page{padding-inline:12px}.panel{padding:22px 14px}.choice{font-size:1rem;padding:10px 17px}}@media(prefers-reduced-motion:reduce){body{animation:none}.choice{transition:none}}
  </style>
</head>
<body><main class="page"><section class="panel">
  <a class="back" href="./tr.html#byo">← Kaseler</a>
  <h1>Kendi Kaseni Oluştur</h1><p class="note">1 taban · 1 protein · en fazla 4 garnitür · 1 sos seçin</p>
  <form id="builder">
    <section class="section"><h2>Taban</h2><div class="choices"><label class="choice"><input type="radio" name="base" value="Pirinç" required>Pirinç</label><label class="choice"><input type="radio" name="base" value="Karabuğday">Karabuğday</label><label class="choice"><input type="radio" name="base" value="Karışık Yeşillikler">Karışık Yeşillikler</label></div></section>
    <section class="section"><h2>Protein</h2><div class="choices"><label class="choice"><input type="radio" name="protein" value="Tavuk" data-price="475" required>Tavuk</label><label class="choice"><input type="radio" name="protein" value="Karides" data-price="545">Karides</label><label class="choice"><input type="radio" name="protein" value="Füme Somon" data-price="545">Füme Somon</label></div></section>
    <section class="section"><h2>Garnitür</h2><div class="choices"><label class="choice"><input type="checkbox" name="toppings" value="Avokado">Avokado</label><label class="choice"><input type="checkbox" name="toppings" value="Cherry Domates">Cherry Domates</label><label class="choice"><input type="checkbox" name="toppings" value="Salatalık">Salatalık</label><label class="choice"><input type="checkbox" name="toppings" value="Brokoli">Brokoli</label><label class="choice"><input type="checkbox" name="toppings" value="Tatlı Mısır">Tatlı Mısır</label><label class="choice"><input type="checkbox" name="toppings" value="Nohut">Nohut</label><label class="choice"><input type="checkbox" name="toppings" value="Mantar">Mantar</label><label class="choice"><input type="checkbox" name="toppings" value="Haşlanmış Yumurta">Haşlanmış Yumurta</label><label class="choice"><input type="checkbox" name="toppings" value="Parmesan">Parmesan</label></div></section>
    <section class="section"><h2>Sos</h2><div class="choices"><label class="choice"><input type="radio" name="sauce" value="AKÇA Özel Sos" required>AKÇA Özel Sos</label><label class="choice"><input type="radio" name="sauce" value="Sezar Sos">Sezar Sos</label><label class="choice"><input type="radio" name="sauce" value="Teriyaki Sos">Teriyaki Sos</label><label class="choice"><input type="radio" name="sauce" value="Sweet Chili Sos">Sweet Chili Sos</label></div></section>
    <p class="price">₺475 Tavuk · ₺545 Karides / Somon · kendi kaseni oluştur fiyatı</p><button class="add" type="submit">Siparişe Ekle →</button>
  </form><section id="summary" class="summary" hidden aria-live="polite"></section>
</section></main>
<script>
document.querySelectorAll('input[name=toppings]').forEach(i=>i.addEventListener('change',()=>{const c=[...document.querySelectorAll('input[name=toppings]:checked')];if(c.length>4){i.checked=false;alert('En fazla 4 garnitür seçiniz.')}}));const values=n=>[...document.querySelectorAll(`input[name="${n}"]:checked`)].map(i=>i.value);builder.addEventListener('submit',e=>{e.preventDefault();const protein=document.querySelector('input[name=protein]:checked');const base=document.querySelector('input[name=base]:checked');const sauce=document.querySelector('input[name=sauce]:checked');if(!protein||!base||!sauce){builder.reportValidity();return}summary.hidden=false;document.body.style.overflow='hidden';summary.innerHTML=`<div class="summary-card"><h2>Seçim Özeti</h2><p><strong>Seçilen ürün tipi:</strong> Kendi Kaseni Oluştur</p><p><strong>Seçilen protein:</strong> ${protein.value}</p><p><strong>Seçilen taban:</strong> ${base.value}</p><p><strong>Seçilen garnitür:</strong> ${values('toppings').join(', ')||'Yok'}</p><p><strong>Seçilen sos:</strong> ${sauce.value}</p><p><strong>Toplam fiyat:</strong> ₺${protein.dataset.price}</p><div class="summary-actions"><button type="button" onclick="summary.hidden=true;document.body.style.overflow=''">Seçimi Düzenle</button><button type="button" onclick="builder.reset();summary.hidden=true;document.body.style.overflow=''">Seçimi Temizle</button><a href="./category-tr.html">Menüye Dön</a></div></div>`;});
</script></body></html>
