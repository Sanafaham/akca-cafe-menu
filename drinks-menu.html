<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café — Drinks Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #c76d2a;
      --cream: #f5efe9;
      --charcoal: #1a1614;
      --soft: #8a7e76;
      --white: #fffdfb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--cream); }

    body {
      min-height: 100vh;
      color: var(--charcoal);
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at 50% -8%, rgba(199, 109, 42, 0.16), transparent 26rem),
        var(--cream);
      animation: pageFade 360ms ease-out both;
    }

    .page {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 10px max(96px, calc(env(safe-area-inset-bottom) + 84px));
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 0 4px 14px;
      min-height: 58px;
    }

    .brand { width: 124px; height: auto; display: block; margin: 0 auto; }

    .home-link {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      color: var(--charcoal);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .home-link::before {
      content: "←";
      margin-right: 7px;
      color: var(--amber);
    }

    .menu-frame {
      overflow: hidden;
      background: var(--white);
      border: 1px solid rgba(199, 109, 42, 0.24);
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(62, 39, 24, 0.12);
    }

    .menu-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 4px 0;
    }

    .button {
      min-height: 46px;
      padding: 12px 10px;
      display: grid;
      place-items: center;
      color: var(--white);
      background: var(--charcoal);
      border: 1px solid var(--charcoal);
      text-align: center;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .button:last-child {
      color: var(--charcoal);
      background: transparent;
      border-color: rgba(26, 22, 20, 0.35);
    }

    .button:focus-visible,
    .home-link:focus-visible {
      outline: 3px solid rgba(199, 109, 42, 0.3);
      outline-offset: 3px;
    }

    .footer {
      padding-top: 20px;
      color: var(--soft);
      text-align: center;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes pageFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a data-main-link href="./main-menu-en.html" aria-label="Return to main menu">
        <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café">
      </a>
      <a class="home-link" data-main-link href="./main-menu-en.html">Main Menu</a>
    </div>

    <figure class="menu-frame">
      <img src="./akca-drinks-menu.jpg" alt="AKÇA bilingual drinks menu with coffee, matcha, bubble teas, mocktails, other drinks, and milkshakes">
    </figure>

    <nav class="actions" aria-label="Drinks menu navigation">
      <a class="button" href="./main-menu-en.html">English Main Menu</a>
      <a class="button" href="./main-menu-tr.html" lang="tr">Türkçe Ana Menü</a>
    </nav>

    <footer class="footer">AKÇA Kitchen &amp; Café · Fresh Daily</footer>
  </main>
  <script>
    const lang = new URLSearchParams(window.location.search).get('lang');
    const mainMenuHref = lang === 'tr' ? './main-menu-tr.html' : './main-menu-en.html';
    const mainMenuText = lang === 'tr' ? 'Ana Menü' : 'Main Menu';
    document.querySelectorAll('[data-main-link]').forEach(link => {
      link.setAttribute('href', mainMenuHref);
      if (link.classList.contains('home-link')) link.textContent = mainMenuText;
    });
  </script>
</body>
</html>
