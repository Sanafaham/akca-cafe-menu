<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café — Ana Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--amber:#c76d2a;--cream:#f5efe9;--charcoal:#1a1614;--soft:#8a7e76;--white:#fffdfb;}
    *{box-sizing:border-box;margin:0;padding:0;} html{background:var(--cream);}
    body{min-height:100svh;color:var(--charcoal);font-family:"DM Sans",sans-serif;background:radial-gradient(circle at 50% -9%,rgba(199,109,42,.17),transparent 18rem),linear-gradient(180deg,#fbf8f4 0%,var(--cream) 58%,#f1e8df 100%);animation:pageFade 420ms ease-out both;}
    .page{width:min(100%,485px);margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 24px max(96px,calc(env(safe-area-inset-bottom) + 84px));}
    .brand{display:block;width:min(64vw,280px);height:auto;margin:0 auto 20px;}
    .rule{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin:0 auto 22px;color:var(--amber);}
    .rule::before,.rule::after{content:"";height:1px;background:rgba(199,109,42,.58);}
    .leaf{font-size:1.35rem;line-height:1;}
    h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(2.55rem,12vw,3.45rem);font-weight:600;line-height:1;text-align:center;}
    .subtitle{margin:10px auto 18px;color:var(--charcoal);font-size:.78rem;font-weight:600;letter-spacing:.17em;line-height:1.45;text-align:center;text-transform:uppercase;}
    .cards{display:grid;gap:16px;margin-top:8px;}
    .card{min-height:110px;padding:17px 20px;display:grid;grid-template-columns:72px 1px 1fr;align-items:center;gap:20px;color:var(--charcoal);background:linear-gradient(145deg,rgba(255,253,251,.94),rgba(247,240,232,.84));border:1px solid rgba(199,109,42,.42);border-radius:18px;box-shadow:0 16px 38px rgba(62,39,24,.11),inset 0 1px 0 rgba(255,255,255,.82);text-decoration:none;touch-action:manipulation;transition:transform 150ms ease,box-shadow 180ms ease,border-color 180ms ease;}
    .icon{width:58px;height:58px;display:grid;place-items:center;color:var(--amber);}
    .icon svg{width:46px;height:46px;stroke:currentColor;stroke-width:1.65;fill:none;stroke-linecap:round;stroke-linejoin:round;}
    .split{height:58px;width:1px;background:rgba(199,109,42,.38);}
    .title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(1.9rem,8vw,2.45rem);font-weight:600;line-height:1.04;}
    .card:hover,.card:focus-visible{border-color:rgba(199,109,42,.78);box-shadow:0 21px 48px rgba(62,39,24,.16),0 0 0 4px rgba(199,109,42,.08);transform:translateY(-2px);outline:none;}
    .card:active{transform:translateY(1px) scale(.992);}
    .footer-link{display:block;width:fit-content;margin:22px auto 0;color:var(--soft);font-size:.68rem;letter-spacing:.12em;text-decoration:none;text-transform:uppercase;}
    @keyframes pageFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @media(max-width:390px){.page{padding-inline:18px}.brand{width:min(64vw,280px);margin-bottom:16px}.card{min-height:98px;padding:14px 16px;grid-template-columns:58px 1px minmax(0,1fr);gap:14px}.icon{width:52px;height:52px}.icon svg{width:40px;height:40px}.split{height:52px}.title{font-size:clamp(1.45rem,7.4vw,1.9rem)}}
    @media(prefers-reduced-motion:reduce){body{animation:none}.card{transition:none}}
  </style>
</head>
<body>
  <main class="page">
    <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café">
    <div class="rule" aria-hidden="true"><span class="leaf">🍁</span></div>
    <h1>Ana Menü</h1>
    <p class="subtitle">Bir menü bölümü seçin<br>Choose a menu section</p>
    <nav class="cards" aria-label="AKÇA ana menü">
      <a class="card" href="./tr.html"><span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M11 25h26c-1.2 8.5-5.5 13-13 13S12.2 33.5 11 25Z"/><path d="M17 20c-2.2-4.5.4-7 4-8"/><path d="M24 20c-2.2-4.5.4-7 4-8"/><path d="M31 20c-2.2-4.5.4-7 4-8"/></svg></span><span class="split" aria-hidden="true"></span><span class="title">Bowls (Kaseler)</span></a>
      <a class="card" href="./pizza.html?lang=tr"><span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M13 37 36 12c3 9 0 18-6 23-5 4-11 5-17 2Z"/><path d="M21 29h.1"/><path d="M27 23h.1"/><path d="M31 31h.1"/></svg></span><span class="split" aria-hidden="true"></span><span class="title">Pizzas (Pizzalar)</span></a>
      <a class="card" href="./drinks.html?lang=tr"><span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M18 14h15l-2.4 24H20.4L18 14Z"/><path d="M17 14h17"/><path d="M25 14V8l6-2"/></svg></span><span class="split" aria-hidden="true"></span><span class="title">Drinks (İçecekler)</span></a>
      <a class="card" href="./dessert.html?lang=tr"><span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M12 34h24"/><path d="M14 25h20v9H14z"/><path d="M16 20h16l2 5H14l2-5Z"/><path d="M24 20v-5"/><circle cx="24" cy="12" r="3"/></svg></span><span class="split" aria-hidden="true"></span><span class="title">Desserts (Tatlılar)</span></a>
    </nav>
    <a class="footer-link" href="./index.html">Dili değiştir</a>
  </main>
</body>
</html>
