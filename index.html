<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café | Menu</title>
  <!-- deploy: price-readability-8077c14 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #c76d2a;
      --amber-soft: #efb98e;
      --cream: #f5efe9;
      --charcoal: #171312;
      --muted: #93877f;
      --card: rgba(255, 253, 250, 0.74);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--cream);
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      color: var(--charcoal);
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.84), transparent 18rem),
        radial-gradient(circle at 12% 78%, rgba(199, 109, 42, 0.08), transparent 16rem),
        linear-gradient(180deg, #fbf8f4 0%, var(--cream) 58%, #f1e8df 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 470px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(60px, env(safe-area-inset-top)) 34px max(84px, calc(env(safe-area-inset-bottom) + 56px));
      display: flex;
      flex-direction: column;
      align-items: stretch;
      animation: pageFade 420ms ease-out both;
    }

    .brand {
      display: block;
      width: min(82vw, 325px);
      height: auto;
      margin: 0 auto 82px;
    }

    .rule {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 26px;
      color: var(--amber);
      margin-bottom: 76px;
    }

    .rule::before,
    .rule::after {
      content: "";
      height: 1px;
      background: rgba(199, 109, 42, 0.72);
    }

    .leaf {
      font-size: 1.55rem;
      line-height: 1;
      filter: drop-shadow(0 4px 7px rgba(199, 109, 42, 0.18));
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 13vw, 4.15rem);
      font-weight: 600;
      line-height: 0.98;
      text-align: center;
      letter-spacing: -0.035em;
    }

    .subtitle {
      margin-top: 22px;
      color: var(--muted);
      font-size: clamp(1.22rem, 5.3vw, 1.62rem);
      line-height: 1.25;
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 26px;
      margin-top: 78px;
    }

    .language-card {
      min-height: 126px;
      padding: 22px 30px;
      display: grid;
      grid-template-columns: 82px 1px 1fr;
      align-items: center;
      gap: 26px;
      color: var(--charcoal);
      background: linear-gradient(145deg, rgba(255, 253, 250, 0.88), var(--card));
      border: 1px solid rgba(199, 109, 42, 0.62);
      border-radius: 17px;
      box-shadow: 0 20px 48px rgba(62, 39, 24, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.82);
      text-decoration: none;
      touch-action: manipulation;
      transition: transform 160ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .language-card:active {
      transform: scale(0.992);
    }

    .language-card:hover,
    .language-card:focus-visible {
      border-color: rgba(199, 109, 42, 0.92);
      box-shadow: 0 24px 58px rgba(62, 39, 24, 0.12), 0 0 0 4px rgba(199, 109, 42, 0.08);
      outline: none;
      transform: translateY(-2px);
    }

    .icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      color: var(--amber);
    }

    .icon svg {
      width: 62px;
      height: 62px;
      display: block;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .turkish-emblem {
      width: 62px;
      height: 62px;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(199, 109, 42, 0.15));
    }

    .split {
      width: 1px;
      height: 76px;
      background: rgba(199, 109, 42, 0.48);
    }

    .label {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.05rem, 9vw, 2.7rem);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1;
    }

    @keyframes pageFade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 390px) {
      .page {
        padding: max(48px, env(safe-area-inset-top)) 28px max(76px, calc(env(safe-area-inset-bottom) + 48px));
      }

      .brand {
        width: min(80vw, 305px);
        margin-bottom: 68px;
      }

      .rule {
        gap: 22px;
        margin-bottom: 62px;
      }

      .actions {
        gap: 22px;
        margin-top: 64px;
      }

      .language-card {
        min-height: 118px;
        padding: 19px 24px;
        grid-template-columns: 70px 1px 1fr;
        gap: 22px;
      }

      .icon,
      .turkish-emblem {
        width: 58px;
        height: 58px;
      }

      .icon svg {
        width: 58px;
        height: 58px;
      }

      .split {
        height: 68px;
      }
    }

    @media (max-height: 760px) {
      .page {
        padding-top: max(34px, env(safe-area-inset-top));
      }

      .brand {
        margin-bottom: 46px;
      }

      .rule {
        margin-bottom: 42px;
      }

      .actions {
        margin-top: 42px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .page,
      .language-card {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="language-heading">
    <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café — Fresh Daily, Brewed Perfectly">

    <div class="rule" aria-hidden="true"><span class="leaf">🍁</span></div>

    <h1 id="language-heading">Choose Language</h1>
    <p class="subtitle" lang="tr">Lütfen dilinizi seçin</p>

    <nav class="actions" aria-label="Menu language">
      <a class="language-card" href="./main-menu-en.html" lang="en">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="24"></circle>
            <path d="M8 32h48"></path>
            <path d="M32 8c7 6 10.5 14 10.5 24S39 50 32 56"></path>
            <path d="M32 8c-7 6-10.5 14-10.5 24S25 50 32 56"></path>
            <path d="M14 20h36"></path>
            <path d="M14 44h36"></path>
          </svg>
        </span>
        <span class="split" aria-hidden="true"></span>
        <span class="label">English</span>
      </a>

      <a class="language-card" href="./main-menu-tr.html" lang="tr">
        <span class="icon" aria-hidden="true">
          <svg class="turkish-emblem" viewBox="0 0 64 64" role="img">
            <defs>
              <radialGradient id="turkishGradient" cx="34%" cy="30%" r="68%">
                <stop offset="0%" stop-color="#ef873e"></stop>
                <stop offset="48%" stop-color="#d96a22"></stop>
                <stop offset="100%" stop-color="#c85513"></stop>
              </radialGradient>
            </defs>
            <circle cx="32" cy="32" r="26" fill="url(#turkishGradient)"></circle>
            <circle cx="27.5" cy="32" r="15.5" fill="#fffdfb"></circle>
            <circle cx="34.5" cy="32" r="12.8" fill="#d66520"></circle>
            <path fill="#fffdfb" d="M46.2 24.8l1.7 5.1h5.4l-4.4 3.1 1.7 5.1-4.4-3.1-4.3 3.1 1.6-5.1-4.3-3.1h5.3z"></path>
          </svg>
        </span>
        <span class="split" aria-hidden="true"></span>
        <span class="label">Türkçe</span>
      </a>
    </nav>
  </main>
</body>
</html>
