<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #c76d2a;
      --amber-light: #e8914a;
      --cream: #f5efe9;
      --cream-dark: #ede5dc;
      --charcoal: #1a1614;
      --soft: #8a7e76;
      --white: #fffdfb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--cream);
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      color: var(--charcoal);
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at 50% -15%, rgba(232, 145, 74, 0.19), transparent 38%),
        linear-gradient(150deg, var(--cream) 0%, #faf7f3 52%, var(--cream-dark) 100%);
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      width: min(100%, 430px);
      min-height: 100svh;
      padding: max(42px, env(safe-area-inset-top)) 24px max(30px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      justify-content: center;
      isolation: isolate;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      z-index: -1;
      border: 1px solid rgba(199, 109, 42, 0.18);
      border-radius: 50%;
    }

    .page::before {
      width: 210px;
      height: 210px;
      top: -104px;
      right: -88px;
    }

    .page::after {
      width: 150px;
      height: 150px;
      bottom: -76px;
      left: -76px;
    }

    .selector {
      width: 100%;
      padding: 42px 26px 30px;
      background: rgba(255, 253, 251, 0.82);
      border: 1px solid rgba(199, 109, 42, 0.24);
      border-radius: 3px;
      box-shadow: 0 24px 70px rgba(62, 39, 24, 0.12);
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: arrive 700ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .logo {
      width: 200px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .divider {
      width: 34px;
      height: 1px;
      margin: 30px auto 28px;
      background: var(--amber);
    }

    .prompt {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.55rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .prompt-tr {
      margin-top: 7px;
      color: var(--soft);
      font-size: 0.86rem;
      letter-spacing: 0.02em;
    }

    .actions {
      margin-top: 30px;
      display: grid;
      gap: 12px;
    }

    .button {
      min-height: 57px;
      padding: 15px 20px;
      border: 1px solid var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--white);
      background: var(--charcoal);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .button:last-child {
      color: var(--charcoal);
      background: transparent;
      border-color: rgba(26, 22, 20, 0.34);
    }

    .button::after {
      content: "→";
      color: var(--amber-light);
      font-family: Georgia, serif;
      font-size: 1.2rem;
      line-height: 1;
      transition: transform 180ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-2px);
    }

    .button:last-child:hover,
    .button:last-child:focus-visible {
      color: var(--white);
      background: var(--amber);
      border-color: var(--amber);
    }

    .button:hover::after,
    .button:focus-visible::after {
      transform: translateX(4px);
    }

    .button:focus-visible {
      outline: 3px solid rgba(199, 109, 42, 0.28);
      outline-offset: 3px;
    }

    .welcome {
      margin-top: 24px;
      color: var(--soft);
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    @keyframes arrive {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 520px) {
      .page {
        min-height: auto;
        padding: 48px 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .selector {
        animation: none;
      }

      .button,
      .button::after {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="selector" aria-labelledby="language-heading">
      <img class="logo" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café — Fresh Daily, Brewed Perfectly">

      <div class="divider" aria-hidden="true"></div>

      <h1 class="prompt" id="language-heading">Please choose your language</h1>
      <p class="prompt-tr" lang="tr">Lütfen dil seçiniz</p>

      <nav class="actions" aria-label="Menu language">
        <a class="button" href="./category-en.html" lang="en">English Menu</a>
        <a class="button" href="./category-tr.html" lang="tr">Türkçe Menü</a>
      </nav>

      <p class="welcome">Welcome · Hoş Geldiniz</p>
    </section>
  </main>
</body>
</html>
