<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café — Dessert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #c76d2a;
      --cream: #f5efe9;
      --charcoal: #1a1614;
      --soft: #8a7e76;
      --white: #fffdfb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--cream); }

    body {
      min-height: 100svh;
      color: var(--charcoal);
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at 50% -8%, rgba(199, 109, 42, 0.18), transparent 20rem),
        var(--cream);
      
    }

    .page {
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 10px max(32px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 0 2px 10px;
      min-height: 82px;
    }

    .topbar .brand {
      width: min(64vw,280px);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .home-link {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      color: var(--charcoal);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .home-link::before {
      content: "←";
      margin-right: 7px;
      color: var(--amber);
    }

    .card {
      width: min(100%, 430px);
      margin: auto;
      padding: 36px 24px 28px;
      background: rgba(255, 253, 251, 0.78);
      border: 1px solid rgba(199, 109, 42, 0.32);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(62, 39, 24, 0.13);
      text-align: center;
    }

    .brand {
      width: min(64vw, 280px);
      height: auto;
      display: block;
      margin: 0 auto 28px;
    }

    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.3rem, 11vw, 3.4rem);
      font-weight: 600;
      line-height: 1;
    }

    .tr {
      margin-top: 8px;
      color: var(--amber);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-style: italic;
    }

    .note {
      margin: 22px auto 0;
      max-width: 24rem;
      color: var(--soft);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 26px;
    }

    .button {
      min-height: 48px;
      padding: 12px 10px;
      display: grid;
      place-items: center;
      color: var(--white);
      background: var(--charcoal);
      border: 1px solid var(--charcoal);
      text-align: center;
      text-decoration: none;
      font-size: 0.74rem;
      font-weight: 500;
    }

    .button:last-child {
      color: var(--charcoal);
      background: transparent;
      border-color: rgba(26, 22, 20, 0.35);
    }

    .button:focus-visible,
    .home-link:focus-visible {
      outline: 3px solid rgba(199, 109, 42, 0.3);
      outline-offset: 3px;
    }

    @keyframes pageFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
    }
  </style>
<style>
  .page-rule{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;color:#c76d2a;margin:0 14px 12px;}
  .page-rule-line{height:1px;background:rgba(199,109,42,.32);display:block;}
</style>
<style>
  
  /* Hide embedded "FRESH DAILY" text from logo image — HTML tagline replaces it */
  .brand, .akca-logo { clip-path: inset(0 0 24% 0); }

  .brand-block{display:flex;flex-direction:column;align-items:center;}
  .tagline{font-size:.82rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#c76d2a;margin-top:0px;text-align:center;line-height:1.4;}
</style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand-block"><a data-main-link href="./main-menu-en.html" aria-label="Return to main menu">
          <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café">
        </a><p class="tagline">Fresh Daily &bull; Brewed Perfectly</p></div>
      <a class="home-link" data-main-link href="./main-menu-en.html">Main Menu</a>
    </div>

    <section class="card">
      <div class="page-rule" aria-hidden="true" style="margin:0 0 14px;"><span class="page-rule-line"></span><span>🍁</span><span class="page-rule-line"></span></div>
      <h1>Dessert Coming Soon</h1>
      <p class="tr" lang="tr">Tatlı menüsü yakında</p>
      <p class="note">Dessert details are being prepared. Please choose another menu category for now.</p>
      <nav class="actions" aria-label="Dessert page navigation">
        <a class="button" href="./main-menu-en.html">English Main Menu</a>
        <a class="button" href="./main-menu-tr.html" lang="tr">Türkçe Ana Menü</a>
      </nav>
    </section>
  </main>
  <script>
    const lang = new URLSearchParams(window.location.search).get('lang');
    const mainMenuHref = lang === 'tr' ? './main-menu-tr.html' : './main-menu-en.html';
    const mainMenuText = lang === 'tr' ? 'Ana Menü' : 'Main Menu';
    document.querySelectorAll('[data-main-link]').forEach(link => {
      link.setAttribute('href', mainMenuHref);
      if (link.classList.contains('home-link')) link.textContent = mainMenuText;
    });
  </script>
</body>
</html>
