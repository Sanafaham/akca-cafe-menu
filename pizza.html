<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café — Pizza Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --amber: #c76d2a;
      --cream: #f5efe9;
      --charcoal: #1a1614;
      --soft: #8a7e76;
      --white: #fffdfb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--cream); }

    body {
      min-height: 100vh;
      color: var(--charcoal);
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(circle at 50% -8%, rgba(199, 109, 42, 0.16), transparent 26rem),
        var(--cream);
    }

    .page {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 10px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 0 4px 14px;
    }

    .brand {
      width: 124px;
      height: auto;
      display: block;
    }

    .home-link {
      color: var(--charcoal);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .home-link::before {
      content: "←";
      margin-right: 7px;
      color: var(--amber);
    }

    .menu-frame {
      overflow: hidden;
      background: var(--white);
      border: 1px solid rgba(199, 109, 42, 0.24);
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(62, 39, 24, 0.12);
    }

    .menu-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 4px 0;
    }

    .button {
      min-height: 46px;
      padding: 12px 10px;
      display: grid;
      place-items: center;
      color: var(--white);
      background: var(--charcoal);
      border: 1px solid var(--charcoal);
      text-align: center;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .button:last-child {
      color: var(--charcoal);
      background: transparent;
      border-color: rgba(26, 22, 20, 0.35);
    }

    .button:focus-visible,
    .home-link:focus-visible {
      outline: 3px solid rgba(199, 109, 42, 0.3);
      outline-offset: 3px;
    }

    .footer {
      padding-top: 20px;
      color: var(--soft);
      text-align: center;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a href="./category-en.html" aria-label="Return to menu categories">
        <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café">
      </a>
      <a class="home-link" href="./category-en.html">Categories</a>
    </div>

    <figure class="menu-frame">
      <img src="./akca-pizza-mobile-menu.png" alt="AKÇA bilingual mobile pizza menu with pizza selections, ingredients, and prices">
    </figure>

    <nav class="actions" aria-label="Pizza menu navigation">
      <a class="button" href="./category-en.html">English Categories</a>
      <a class="button" href="./category-tr.html" lang="tr">Türkçe Kategoriler</a>
    </nav>

    <footer class="footer">AKÇA Kitchen &amp; Café · Fresh Daily</footer>
  </main>
</body>
</html>
