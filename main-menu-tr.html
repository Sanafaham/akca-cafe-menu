<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe9">
  <title>AKÇA Kitchen &amp; Café — Ana Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--amber:#c76d2a;--amber-dark:#9f4816;--cream:#f5efe9;--charcoal:#100d0c;--soft:#6f625b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html{background:var(--cream);}
    body{min-height:100svh;color:var(--charcoal);font-family:"DM Sans",sans-serif;background:radial-gradient(circle at 50% -8%,rgba(199,109,42,.16),transparent 22rem),var(--cream);}

    .page{width:min(100%,430px);margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 14px max(96px,calc(env(safe-area-inset-bottom) + 84px));}

    .topbar{position:relative;display:flex;align-items:center;justify-content:center;margin:0 2px 10px;min-height:82px;}
    .brand-block{display:flex;flex-direction:column;align-items:center;}
    .brand{display:block;width:min(64vw,280px);height:auto;clip-path:inset(0 0 24% 0);}
    .tagline{font-size:.82rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#c76d2a;margin-top:0;text-align:center;line-height:1.4;}

    .hero{text-align:center;margin-bottom:14px;}
    .rule{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;color:var(--amber);margin:14px 0 16px;}
    .rule::before,.rule::after{content:"";height:1px;background:rgba(199,109,42,.36);}
    h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(2.2rem,11vw,3.35rem);line-height:1;font-weight:700;}
    .subtitle{margin-top:6px;color:var(--soft);font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;text-align:center;line-height:1.5;}

    .cards{display:grid;gap:10px;margin-top:4px;}
    .card{
      display:flex;align-items:center;gap:14px;
      padding:13px 14px;
      color:var(--charcoal);
      background:linear-gradient(145deg,rgba(255,253,251,.95),rgba(247,240,232,.88));
      border:1px solid rgba(199,109,42,.22);
      border-radius:15px;
      box-shadow:0 10px 24px rgba(62,39,24,.13);
      text-decoration:none;
      transition:transform 150ms ease,box-shadow 180ms ease,border-color 180ms ease;
    }
    .card:hover,.card:focus-visible{border-color:rgba(199,109,42,.72);box-shadow:0 16px 34px rgba(62,39,24,.17),0 0 0 4px rgba(199,109,42,.08);transform:translateY(-1px);outline:none;}
    .card:active{transform:scale(.992);}
    .icon{flex-shrink:0;width:36px;height:36px;display:grid;place-items:center;color:var(--amber);opacity:.85;}
    .icon svg{width:28px;height:28px;stroke:currentColor;stroke-width:1.65;fill:none;stroke-linecap:round;stroke-linejoin:round;}
    .card-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(1.6rem,7vw,2.1rem);font-weight:700;line-height:1.04;color:#100d0c;}

    .footer-link{display:block;width:fit-content;margin:18px auto 0;color:var(--soft);font-size:.62rem;letter-spacing:.14em;text-decoration:none;text-transform:uppercase;}

    @media(max-width:390px){
      .page{padding-inline:10px;}
      .brand{width:min(56vw,210px);}
      .cards{gap:8px;}
      .card{padding:11px 12px;gap:12px;}
      .icon{width:30px;height:30px;}
      .icon svg{width:24px;height:24px;}
      .card-title{font-size:clamp(1.4rem,6.5vw,1.8rem);}
    }
    @media(prefers-reduced-motion:reduce){.card{transition:none;}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand-block">
        <img class="brand" src="./akca-logo.png" alt="AKÇA Kitchen &amp; Café">
        <p class="tagline">Fresh Daily &bull; Brewed Perfectly</p>
      </div>
    </div>
    <header class="hero">
      <div class="rule" aria-hidden="true"><span>🍁</span></div>
      <h1>Ana Menü</h1>
      <p class="subtitle">Bir menü bölümü seçin · Choose a menu section</p>
    </header>
    <nav class="cards" aria-label="AKÇA ana menü">
      <a class="card" href="./bowls-tr.html">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M11 25h26c-1.2 8.5-5.5 13-13 13S12.2 33.5 11 25Z"/><path d="M17 20c-2.2-4.5.4-7 4-8"/><path d="M24 20c-2.2-4.5.4-7 4-8"/><path d="M31 20c-2.2-4.5.4-7 4-8"/></svg></span>
        <span class="card-title">Kaseler (Bowls)</span>
      </a>
      <a class="card" href="./pizza-menu.html?lang=tr">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M13 37 36 12c3 9 0 18-6 23-5 4-11 5-17 2Z"/><path d="M21 29h.1"/><path d="M27 23h.1"/><path d="M31 31h.1"/></svg></span>
        <span class="card-title">Pizzalar (Pizzas)</span>
      </a>
      <a class="card" href="./drinks-menu.html?lang=tr">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M18 14h15l-2.4 24H20.4L18 14Z"/><path d="M17 14h17"/><path d="M25 14V8l6-2"/></svg></span>
        <span class="card-title">İçecekler (Drinks)</span>
      </a>
      <a class="card" href="./dessert-menu.html?lang=tr">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 48 48"><path d="M12 34h24"/><path d="M14 25h20v9H14z"/><path d="M16 20h16l2 5H14l2-5Z"/><path d="M24 20v-5"/><circle cx="24" cy="12" r="3"/></svg></span>
        <span class="card-title">Tatlılar (Desserts)</span>
      </a>
    </nav>
    <a class="footer-link" href="./index.html">Dil değiştir</a>
  </main>
</body>
</html>
